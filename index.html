<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum League 终端 V2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: #e2e8f0; font-size: 16px; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .scroll-v::-webkit-scrollbar { width: 6px; }
        .scroll-v::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        /* 这里的设置让左侧列表更高大清晰 */
        .fixture-card { padding: 1.25rem; margin-bottom: 0.75rem; font-size: 1.1rem; }
    </style>
</head>
<body class="min-h-screen flex flex-col overflow-hidden text-lg">

    <header class="h-20 border-b border-slate-800 flex items-center justify-between px-8 bg-black/50">
        <div class="flex items-center gap-6">
            <div class="bg-sky-500 text-black px-3 py-1.5 rounded font-black text-base italic tracking-tighter">QUANTUM LIVE V2.0</div>
            <div class="text-sm text-slate-400">系统时间: <span id="clock" class="mono text-sky-400">2026-03-05 17:41:22</span></div>
        </div>
        <div class="flex gap-4 items-center bg-slate-900/50 px-4 py-2 rounded-full border border-slate-800">
            <span class="relative flex h-3 w-3"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span><span class="relative inline-flex rounded-full h-3 w-3 bg-green-500"></span></span>
            <span class="text-sm font-bold mono uppercase">Cloud Sync Active</span>
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden">
        
        <aside class="w-[450px] border-r border-slate-800 flex flex-col bg-slate-900/20">
            <div class="p-6 border-b border-slate-800 bg-black/20">
                <h2 class="font-bold text-lg uppercase tracking-[0.2em] text-sky-500">48H 核心赛程监控</h2>
                <p class="text-xs text-slate-500 mt-1">自动锁定五大联赛焦点战</p>
            </div>

            <div class="flex-1 overflow-y-auto scroll-v p-4 space-y-4" id="fixtureList">
                </div>
        </aside>

        <section class="flex-1 p-8 overflow-y-auto scroll-v bg-black relative">
            
            <div id="welcomeMessage" class="h-full flex flex-col items-center justify-center text-slate-600 gap-6">
                <div class="w-24 h-24 border-2 border-slate-800 rounded-full flex items-center justify-center animate-pulse">
                    <svg class="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg>
                </div>
                <p class="text-lg font-medium tracking-wide">请从左侧列表选择一场比赛以激活量化终端</p>
            </div>

            <div id="analysisDashboard" class="hidden space-y-8">
                <div class="flex justify-between items-center border-l-4 border-sky-500 pl-6">
                    <div>
                        <div id="anaLeague" class="text-sm font-bold text-sky-400 mb-2 uppercase tracking-widest">---</div>
                        <h2 id="anaTeams" class="text-6xl font-black italic tracking-tighter">---</h2>
                        <p id="anaTime" class="text-slate-500 text-lg mt-3 mono">---</p>
                    </div>
                    <div class="text-right bg-slate-900/50 p-6 rounded-3xl border border-slate-800">
                        <div class="text-xs text-slate-500 mb-2 uppercase font-bold">拟合散度 D-Index</div>
                        <div id="anaDivIdx" class="text-6xl font-mono font-black text-emerald-400">0.00</div>
                    </div>
                </div>

                <div class="grid grid-cols-12 gap-8">
                    <div class="col-span-6 glass-card p-8 rounded-[2rem]">
                        <div class="flex justify-between items-center mb-8">
                            <h3 class="font-bold text-base flex items-center gap-3">
                                <span class="w-3 h-3 rounded-full bg-emerald-500 shadow-[0_0_10px_#10b981]"></span> 实时资金拟合路径
                            </h3>
                        </div>
                        <div style="height: 350px;">
                            <canvas id="liveFittingChart"></canvas>
                        </div>
                    </div>
                    
                    <div class="col-span-6 space-y-8">
                        <div class="grid grid-cols-2 gap-8">
                            <div class="glass-card p-8 rounded-[2rem] flex flex-col items-center">
                                <h4 class="text-sm font-bold text-slate-500 mb-6 uppercase tracking-widest">预测信心度</h4>
                                <div class="relative h-40 w-40">
                                    <canvas id="confidenceGauge"></canvas>
                                    <div class="absolute inset-0 flex items-center justify-center font-black text-3xl mono" id="confValue">--%</div>
                                </div>
                            </div>
                            <div class="glass-card p-8 rounded-[2rem]">
                                <h4 class="text-sm font-bold text-slate-500 mb-6 uppercase tracking-widest">模型建议</h4>
                                <div id="modelSignal" class="text-3xl font-black text-sky-400 mb-4">---</div>
                                <div id="biasIndicator" class="text-lg font-bold text-emerald-400">等待输入...</div>
                            </div>
                        </div>
                        
                        <div class="glass-card p-8 rounded-[2rem] bg-sky-500/5 border-sky-500/20">
                            <h4 class="text-sm font-bold text-sky-500 mb-4 uppercase tracking-widest">核心情报分析 (Intelligence)</h4>
                            <div id="anaInsight" class="text-lg leading-relaxed text-slate-300 font-medium">
                                正在接入数据源并同步各主流机构实时赔率变化...
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script>
        // --- 数据更新：2026年3月5日-3月7日（48小时内） ---
        const fixtures = [
            { id: 2001, league: "英超", date: "2026-03-05", time: "20:00", home: "利物浦", away: "切尔西", importance: "H" },
            { id: 2002, league: "西甲", date: "2026-03-06", time: "04:00", home: "皇家马德里", away: "赫罗纳", importance: "H" },
            { id: 2003, league: "意甲", date: "2026-03-06", time: "21:30", home: "那不勒斯", away: "拉齐奥", importance: "M" },
            { id: 2004, league: "德甲", date: "2026-03-07", time: "03:30", home: "拜仁慕尼黑", away: "弗赖堡", importance: "H" },
            { id: 2005, league: "法甲", date: "2026-03-07", time: "19:00", home: "里昂", away: "里尔", importance: "M" }
        ];

        let fittingChart, gaugeChart;
        const labels = ["初盘", "-24h", "-12h", "-6h", "-3h", "-2h", "-1h", "实时"];

        function init() {
            renderFixtures();
            setInterval(() => {
                document.getElementById('clock').textContent = new Date().toLocaleString();
            }, 1000);
        }

        function renderFixtures() {
            const container = document.getElementById('fixtureList');
            fixtures.forEach(f => {
                const card = document.createElement('div');
                card.className = "p-5 rounded-2xl bg-slate-800/40 border border-slate-700/50 hover:border-sky-500 hover:bg-slate-800/60 cursor-pointer transition-all duration-300";
                card.onclick = () => selectMatch(f);
                card.innerHTML = `
                    <div class="flex justify-between items-center mb-3">
                        <span class="text-xs font-black bg-sky-500 text-black px-2 py-0.5 rounded">${f.league}</span>
                        <span class="text-sm text-slate-400 mono font-bold">${f.date}</span>
                    </div>
                    <div class="flex justify-between items-center px-2">
                        <span class="font-bold text-xl">${f.home}</span>
                        <span class="text-xs text-slate-600 font-black italic">VS</span>
                        <span class="font-bold text-xl text-right">${f.away}</span>
                    </div>
                    <div class="mt-4 flex justify-between items-center">
                        <span class="text-[10px] text-slate-500 uppercase font-bold tracking-widest">${f.time} KICKOFF</span>
                        <div class="flex gap-1">${f.importance === 'H' ? '<div class="w-2 h-2 rounded-full bg-sky-500"></div><div class="w-2 h-2 rounded-full bg-sky-500"></div>' : '<div class="w-2 h-2 rounded-full bg-slate-600"></div>'}</div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function selectMatch(f) {
            document.getElementById('welcomeMessage').classList.add('hidden');
            document.getElementById('analysisDashboard').classList.remove('hidden');
            document.getElementById('anaTeams').textContent = `${f.home} VS ${f.away}`;
            document.getElementById('anaLeague').textContent = `${f.league} | 深度量化序列`;
            document.getElementById('anaTime').textContent = `时间锚点: ${f.date} ${f.time}`;

            const baseOdds = 1.6 + Math.random();
            const whData = Array.from({length: 8}, (_, i) => baseOdds + Math.sin(i*0.4)*0.08 + (Math.random()*0.03));
            const pinData = whData.map((v, i) => v - (i * 0.03) + (Math.random()*0.02));
            const divIdx = (whData[7] - pinData[7]).toFixed(2);
            document.getElementById('anaDivIdx').textContent = divIdx;
            
            updateCharts(whData, pinData);
            updateLogic(divIdx, f);
        }

        function updateCharts(wh, pin) {
            if (fittingChart) fittingChart.destroy();
            const ctx = document.getElementById('liveFittingChart').getContext('2d');
            fittingChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        { label: '市场基准', data: wh, borderColor: '#475569', borderDash: [5, 5], pointRadius: 0, tension: 0.4 },
                        { label: '量化拟合', data: pin, borderColor: '#10b981', borderWidth: 5, pointRadius: 4, fill: true, backgroundColor: 'rgba(16, 185, 129, 0.1)', tension: 0.4 }
                    ]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { grid: { color: '#1e293b' }, ticks: { color: '#64748b' } }, x: { grid: { display: false }, ticks: { color: '#64748b' } } } }
            });

            if (gaugeChart) gaugeChart.destroy();
            const gCtx = document.getElementById('confidenceGauge').getContext('2d');
            const confValue = Math.floor(Math.random() * 25 + 70);
            document.getElementById('confValue').textContent = `${confValue}%`;
            gaugeChart = new Chart(gCtx, {
                type: 'doughnut',
                data: { datasets: [{ data: [confValue, 100 - confValue], backgroundColor: ['#0ea5e9', '#1e293b'], borderWidth: 0, circumference: 180, rotation: 270 }] },
                options: { responsive: true, maintainAspectRatio: false, cutout: '80%', plugins: { legend: { display: false } } }
            });
        }

        function updateLogic(div, f) {
            const insight = document.getElementById('anaInsight');
            const signal = document.getElementById('modelSignal');
            const bias = document.getElementById('biasIndicator');

            if (div > 0.08) {
                insight.innerHTML = `检测到 <span class="text-emerald-400 font-bold underline">机构资金非对称流入</span>。平博(Pinnacle)拟合路径明显低于欧洲平均基准线。这通常意味着大额资金在看好 <span class="text-sky-400 font-bold">${f.home}</span>。结合近24小时波动率，该信号信度极高。`;
                signal.textContent = `${f.home} 占优`;
                bias.textContent = `偏离度: + ${(div*100).toFixed(1)}%`;
            } else {
                insight.innerHTML = "当前市场各方力量均衡，未见显著的量化倾斜。建议等待开赛前 60 分钟的“黄金窗口”信号突破。";
                signal.textContent = "中立/观望";
                bias.textContent = "无显著偏离";
            }
        }
        window.onload = init;
    </script>
</body>
</html>
