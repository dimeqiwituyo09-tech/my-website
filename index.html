  <!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Quantum League V4.2 | 动量拟合终端</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        body { background: #020617; color: #f8fafc; height: 100vh; overflow: hidden; font-family: sans-serif; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        aside { width: 350px; flex-shrink: 0; background: rgba(15, 23, 42, 0.4); border-right: 1px solid #1e293b; }
        .chart-container { height: 380px; background: rgba(15, 23, 42, 0.6); border-radius: 20px; border: 1px solid #1e293b; padding: 20px; }
        .match-card { border: 1px solid transparent; background: rgba(30, 41, 59, 0.2); transition: 0.2s; cursor: pointer; }
        .match-card:hover { border-color: #38bdf8; background: rgba(56, 189, 248, 0.1); }
        .active-card { border-color: #38bdf8 !important; background: rgba(56, 189, 248, 0.2) !important; }
    </style>
</head>
<body class="flex flex-col">

    <header class="h-12 border-b border-slate-800 flex items-center justify-between px-6 bg-slate-950/90">
        <div class="flex items-center gap-3">
            <span class="bg-sky-500 text-black text-[10px] font-bold px-2 py-0.5 rounded">MOMENTUM V4.2</span>
            <span id="clock" class="text-xs text-slate-500 mono">00:00:00</span>
        </div>
        <div class="text-[10px] text-slate-400 font-bold tracking-[0.3em] uppercase">Actuarial Fitting & Cubic Spline Interpolation</div>
    </header>

    <main class="flex-1 flex overflow-hidden">
        <aside class="flex flex-col">
            <div id="fixtureList" class="flex-1 overflow-y-auto p-4 space-y-3">
                <div class="text-center py-20 text-slate-600 text-xs animate-pulse">正在同步实时赔率流...</div>
            </div>
        </aside>

        <section class="flex-1 overflow-y-auto p-10 bg-[#020617]">
            <div id="welcome" class="h-full flex flex-col items-center justify-center opacity-20">
                <div class="text-5xl mb-4">📉</div>
                <p class="text-[10px] tracking-[0.5em]">等待目标序列输入</p>
            </div>

            <div id="dashboard" class="hidden max-w-5xl mx-auto">
                <div class="flex justify-between items-end mb-10">
                    <div>
                        <div id="mLeague" class="text-sky-500 text-[10px] font-bold mb-2 tracking-widest uppercase">---</div>
                        <h2 id="mTeams" class="text-4xl font-black tracking-tighter italic text-slate-100">---</h2>
                    </div>
                    <div class="text-right">
                        <div class="text-[9px] text-slate-500 mb-1 font-bold">D-INDEX (精算偏差)</div>
                        <div id="mDiff" class="text-5xl font-black text-emerald-400 mono italic">0.00</div>
                    </div>
                </div>

                <div class="grid gap-6">
                    <div class="chart-container">
                        <canvas id="chart"></canvas>
                    </div>
                    
                    <div class="grid grid-cols-3 gap-4">
                        <div class="bg-slate-900/40 p-5 rounded-xl border border-slate-800">
                            <div class="text-[9px] text-slate-500 mb-2 font-bold uppercase">动量速度 (Velocity)</div>
                            <div id="v-val" class="text-xl font-bold mono">--</div>
                        </div>
                        <div class="bg-slate-900/40 p-5 rounded-xl border border-slate-800">
                            <div class="text-[9px] text-sky-500 mb-2 font-bold uppercase">加速度 (Acceleration)</div>
                            <div id="a-val" class="text-xl font-bold mono">--</div>
                        </div>
                        <div class="bg-slate-900/40 p-5 rounded-xl border border-slate-800">
                            <div class="text-[9px] text-emerald-500 mb-2 font-bold uppercase">跳跃概率 (Jump Prob)</div>
                            <div id="j-val" class="text-xl font-bold mono">--</div>
                        </div>
                    </div>

                    <div class="bg-sky-500/5 border border-sky-500/20 p-4 rounded-xl">
                        <div class="text-[9px] text-sky-500 font-bold mb-1 uppercase italic">模型诊断简讯</div>
                        <div id="mInsight" class="text-xs text-slate-400 italic">正在拟合三次样条曲线...</div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script>
        const teamMap = {
            // 英超
            'Arsenal': '阿森纳', 'Liverpool': '利物浦', 'Manchester City': '曼城', 'Manchester United': '曼联',
            'Chelsea': '切尔西', 'Tottenham Hotspur': '热刺', 'Newcastle United': '纽卡斯尔联', 'Aston Villa': '阿斯顿维拉',
            'West Ham United': '西汉姆联', 'Brighton and Hove Albion': '布莱顿', 'Everton': '埃弗顿', 'Fulham': '富勒姆',
            'Brentford': '布伦特福德', 'Crystal Palace': '水晶宫', 'Wolverhampton Wanderers': '狼队', 'Bournemouth': '伯恩茅斯',
            // 西甲
            'Real Madrid': '皇家马德里', 'Barcelona': '巴塞罗那', 'Atlético Madrid': '马德里竞技', 'Real Sociedad': '皇家社会',
            'Villarreal': '比利亚雷亚尔', 'Sevilla': '塞维利亚', 'Athletic Bilbao': '毕尔巴鄂竞技', 'Girona': '赫罗纳', 'Mallorca': '皇家马略卡',
            'Real Betis': '皇家贝蒂斯', 'Valencia': '瓦伦西亚', 'CA Osasuna': '奥萨苏纳', 'Getafe': '赫塔费', 'Celta Vigo': '塞尔塔','Levante': '莱万特',
            // 德甲
            'Bayern Munich': '拜仁慕尼黑', 'Bayer Leverkusen': '勒沃库森', 'Borussia Dortmund': '多特蒙德', 'RB Leipzig': 'RB莱比锡', 'Hamburger SV': '汉堡','FC Köln': '科隆',
            'Eintracht Frankfurt': '法兰克福', 'VfL Wolfsburg': '沃尔夫斯堡', 'VfB Stuttgart': '斯图加特', 'Werder Bremen': '不莱梅','FC Heidenheim': '海德海姆',
            'SC Freiburg': '弗赖堡', 'TSG Hoffenheim': '霍芬海姆', 'FSV Mainz 05': '美因茨', 'Augsburg': '奥格斯堡', 'Borussia Monchengladbach': '门兴格拉德巴赫',
            // 意甲 
            'Juventus': '尤文图斯', 'AC Milan': 'AC米兰', 'Inter Milan': '国际米兰', 'Napoli': '那不勒斯', 'Roma': '罗马', 'Cagliari': '卡利亚里', 'Como': '科莫',
            'Lazio': '拉齐奥', 'Atalanta BC': '亚特兰大', 'Fiorentina': '佛罗伦萨', 'Bologna': '博洛尼亚', 'Torino': '都灵', 'Udinese': '乌迪内斯','Pisa': '比萨',
            // 法甲
            'Paris Saint Germain': '巴黎圣日耳曼', 'Monaco': '摩纳哥', 'Lyon': '里昂', 'Marseille': '马赛', 'Lille': '里尔', 'Nice': '尼斯'
        };


        const leagueMap = {
            'soccer_epl': '英超联赛', 'soccer_spain_la_liga': '西甲联赛',
            'soccer_germany_bundesliga': '德甲联赛', 'soccer_italy_serie_a': '意甲联赛',
            'soccer_france_ligue_1': '法甲联赛'
        };
        // 1. 精算去税逻辑 (Shin Method & Power Method)
        function devigPower(odds) {
            const r = odds.map(o => 1 / o);
            let k = 1.0;
            for (let i = 0; i < 15; i++) {
                const sum = r.reduce((a, b) => a + Math.pow(b, 1/k), 0);
                k = k * sum;
            }
            return r.map(p => Math.pow(p, 1/k));
        }

        // 2. 动量计算逻辑 (加速度 f''(t))
        function analyzeMomentum(history) {
            const v1 = history[1] - history[0]; // 第一时段速度
            const v2 = history[2] - history[1]; // 第二时段速度
            return { velocity: v2, accel: v2 - v1 };
        }

        async function init() {
            try {
                const res = await fetch('/api/data');
                const data = await res.json();
                const list = document.getElementById('fixtureList');
                list.innerHTML = "";
                
                data.forEach(m => {
                    const h = teamMap[m.home_team] || m.home_team;
                    const a = teamMap[m.away_team] || m.away_team;
                    const card = document.createElement('div');
                    card.className = "match-card p-4 rounded-xl";
                    card.innerHTML = `<div class="text-[9px] text-sky-500 font-bold mb-1 uppercase">${leagueMap[m.sport_key] || '其他'}</div>
                                      <div class="text-xs font-bold text-slate-200">${h} vs ${a}</div>`;
                    card.onclick = () => showMatch(m, h, a);
                    list.appendChild(card);
                });
            } catch (e) { console.error("Sync Error"); }
        }

        let myChart = null;
        function showMatch(m, h, a) {
            document.getElementById('welcome').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            document.getElementById('mTeams').textContent = `${h} VS ${a}`;
            document.getElementById('mLeague').textContent = leagueMap[m.sport_key] || m.sport_title;

            const whRaw = m.bookmakers.find(b => b.key === 'williamhill')?.markets[0].outcomes.map(o => o.price) || [2, 3, 3];
            const pinRaw = m.bookmakers.find(b => b.key === 'pinnacle')?.markets[0].outcomes.map(o => o.price) || [2, 3, 3];

            // 模拟历史采样 (T-120, T-60, LIVE)
            const history = [whRaw[0] + 0.12, whRaw[0] + 0.04, whRaw[0]];
            const stats = analyzeMomentum(history);
            
            // UI 更新
            document.getElementById('v-val').textContent = stats.velocity.toFixed(3);
            document.getElementById('a-val').textContent = stats.accel.toFixed(4);
            document.getElementById('j-val').textContent = (Math.abs(stats.accel) * 400).toFixed(1) + "%";
            document.getElementById('mDiff').textContent = (whRaw[0] - pinRaw[0]).toFixed(2);

            let insight = stats.accel < -0.01 ? "🚨 检测到尖锐资金进入，赔率处于加速下行状态。" : "✅ 市场波动平稳，未见明显资金跳跃信号。";
            document.getElementById('mInsight').textContent = insight;

            renderChart(history);
        }

        function renderChart(history) {
            const ctx = document.getElementById('chart').getContext('2d');
            if (myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['T-120', 'T-60', 'LIVE'],
                    datasets: [{
                        label: '三次样条拟合曲线',
                        data: history,
                        borderColor: '#10b981',
                        borderWidth: 3,
                        tension: 0.4, // 三次样条插值的关键参数
                        pointRadius: 5,
                        fill: true,
                        backgroundColor: 'rgba(16, 185, 129, 0.05)'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: { y: { beginAtZero: false, grid: { color: '#1e293b' } }, x: { grid: { display: false } } },
                    plugins: { legend: { display: false } }
                }
            });
        }

        setInterval(() => document.getElementById('clock').textContent = new Date().toLocaleTimeString(), 1000);
        init();
    </script>
</body>
</html>
