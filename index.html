<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum League | 实时监控</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background: #020617; color: #f8fafc; height: 100vh; overflow: hidden; font-family: sans-serif; }
        .scroll-v { overflow-y: auto; height: calc(100vh - 120px); }
        .scroll-v::-webkit-scrollbar { width: 4px; }
        .scroll-v::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        .match-card { border: 1px solid rgba(56, 189, 248, 0.1); background: rgba(15, 23, 42, 0.5); }
        .error-box { border: 1px dashed #ef4444; background: rgba(239, 68, 68, 0.05); }
    </style>
</head>
<body class="flex flex-col">

    <header class="h-14 border-b border-slate-800 flex items-center justify-between px-6 bg-slate-950">
        <div class="flex items-center gap-3">
            <span class="bg-sky-500 text-black text-[10px] font-black px-2 py-0.5 rounded italic">V2.9 DIAGNOSTIC</span>
            <span id="clock" class="text-xs text-slate-500 font-mono">--:--:--</span>
        </div>
        <div id="status" class="text-[9px] text-emerald-400 font-bold uppercase tracking-widest">● 系统在线</div>
    </header>

    <main class="flex-1 flex overflow-hidden">
        <aside class="w-[380px] border-r border-slate-800 bg-slate-900/20">
            <div class="p-4 border-b border-slate-800 flex justify-between items-center bg-black/40">
                <span class="text-[10px] font-bold text-sky-500 uppercase tracking-widest">探测序列</span>
                <span id="mCount" class="text-[10px] text-slate-500 font-mono">WAITING...</span>
            </div>
            <div id="fixtureList" class="scroll-v p-4 space-y-3">
                <div id="loader" class="py-20 text-center text-slate-700 animate-pulse text-[10px] uppercase tracking-widest">Scanning Satellites...</div>
            </div>
        </aside>

        <section class="flex-1 bg-black p-10 overflow-y-auto relative">
            <div id="welcome" class="h-full flex flex-col items-center justify-center opacity-10">
                <p class="tracking-[0.8em] text-[10px] uppercase">Select Unit to Decrypt</p>
            </div>
            <div id="dashboard" class="hidden">
                <div id="mTeams" class="text-4xl font-black italic uppercase mb-8">---</div>
                <div class="grid grid-cols-12 gap-6">
                    <div class="col-span-8 bg-slate-900/40 p-6 rounded-2xl border border-slate-800">
                        <canvas id="chart" height="300"></canvas>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script>
        async function update() {
            const list = document.getElementById('fixtureList');
            const status = document.getElementById('status');
            
            try {
                const res = await fetch('/api/data');
                const data = await res.json();

                if (!res.ok) {
                    throw new Error(data.detail || 'Unknown Error');
                }

                list.innerHTML = "";
                document.getElementById('mCount').textContent = `${data.length} MATCHES`;
                
                data.forEach(m => {
                    const card = document.createElement('div');
                    card.className = "match-card p-4 rounded-xl cursor-pointer hover:bg-slate-800/80 transition-all";
                    card.innerHTML = `
                        <div class="text-[9px] text-sky-500 font-bold mb-1 uppercase">${m.sport_title}</div>
                        <div class="text-sm font-bold">${m.home_team} VS ${m.away_team}</div>
                        <div class="text-[9px] text-slate-500 mt-2 font-mono">${new Date(m.commence_time).toLocaleString()}</div>
                    `;
                    card.onclick = () => showMatch(m);
                    list.appendChild(card);
                });
            } catch (e) {
                status.textContent = "● 连接中断";
                status.className = "text-[9px] text-red-500 font-bold uppercase";
                list.innerHTML = `
                    <div class="error-box p-6 rounded-xl text-center">
                        <div class="text-red-500 font-black text-[11px] mb-2 uppercase italic">Data Link Interrupted</div>
                        <div class="text-slate-500 text-[9px] leading-relaxed mono break-words">${e.message}</div>
                        <button onclick="location.reload()" class="mt-4 px-4 py-1.5 bg-slate-800 text-[9px] font-bold rounded-full uppercase hover:bg-sky-500 hover:text-black transition-all">尝试重新对流</button>
                    </div>
                `;
            }
        }

        function showMatch(m) {
            document.getElementById('welcome').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            document.getElementById('mTeams').textContent = `${m.home_team} VS ${m.away_team}`;
            // 图表逻辑省略，保持简洁
        }

        window.onload = () => {
            update();
            setInterval(() => document.getElementById('clock').textContent = new Date().toLocaleTimeString(), 1000);
        };
    </script>
</body>
</html>
