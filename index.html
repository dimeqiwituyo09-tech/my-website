<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum League 2.4 | 量化探测终端</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        body { font-family: 'Inter', 'Microsoft YaHei', sans-serif; background-color: #050505; color: #e2e8f0; height: 100vh; overflow: hidden; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        
        /* 强制开启滚动条样式 */
        .scroll-v { overflow-y: auto; scrollbar-width: thin; scrollbar-color: #334155 #050505; }
        .scroll-v::-webkit-scrollbar { width: 6px; }
        .scroll-v::-webkit-scrollbar-track { background: #050505; }
        .scroll-v::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        
        @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
        .match-card { animation: slideIn 0.4s ease forwards; }
    </style>
</head>
<body class="flex flex-col">

    <header class="h-16 border-b border-slate-800 flex items-center justify-between px-8 bg-black/80 z-10">
        <div class="flex items-center gap-6">
            <div class="bg-sky-500 text-black px-2 py-1 rounded font-black text-sm italic">QUANTUM V2.4</div>
            <div class="text-xs text-slate-500 mono" id="clock">--:--:--</div>
        </div>
        <div id="statusTag" class="text-[10px] font-bold text-green-400 bg-green-400/10 px-3 py-1 rounded-full border border-green-400/20 uppercase tracking-widest">
            ● 系统在线 | 探测模式已开启
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden">
        <aside class="w-[400px] border-r border-slate-800 bg-slate-950/50 flex flex-col">
            <div class="p-4 border-b border-slate-800 flex justify-between items-center bg-black/20">
                <h2 class="font-bold text-xs text-sky-500 uppercase tracking-[0.2em]">数据探测序列</h2>
                <span id="matchCount" class="text-[10px] bg-slate-800 px-2 py-0.5 rounded text-slate-400">0 场</span>
            </div>
            
            <div id="fixtureList" class="flex-1 scroll-v p-4 space-y-3">
                <div class="text-center py-20 text-slate-600 text-sm animate-pulse">正在扫频实时赛事数据...</div>
            </div>
        </aside>

        <section class="flex-1 bg-black overflow-y-auto p-8">
            <div id="welcomeMessage" class="h-full flex flex-col items-center justify-center text-slate-700">
                <div class="w-16 h-16 border border-slate-800 rounded-full flex items-center justify-center mb-4">
                    <svg class="w-8 h-8 opacity-20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg>
                </div>
                <p class="text-sm uppercase tracking-widest font-bold">选择左侧赛事以分析机构偏差</p>
            </div>

            <div id="analysisDashboard" class="hidden space-y-8">
                <div class="flex justify-between items-end border-b border-slate-800 pb-8">
                    <div>
                        <div id="anaLeague" class="text-xs font-bold text-sky-500 mb-2 uppercase tracking-widest">---</div>
                        <h2 id="anaTeams" class="text-4xl font-black italic tracking-tighter uppercase leading-none">---</h2>
                        <p id="anaTime" class="text-slate-500 text-sm mt-4 mono">---</p>
                    </div>
                    <div class="text-right">
                        <div class="text-[10px] text-slate-500 mb-1 uppercase font-bold tracking-widest">Pinnacle 偏离度</div>
                        <div id="anaDivIdx" class="text-5xl font-mono font-black text-emerald-400 leading-none">0.00</div>
                    </div>
                </div>

                <div class="grid grid-cols-12 gap-6">
                    <div class="col-span-8 glass-card p-6 rounded-2xl">
                        <h3 class="text-xs font-bold mb-6 text-slate-500 uppercase tracking-widest">拟合趋势分析</h3>
                        <div style="height: 300px;"><canvas id="liveFittingChart"></canvas></div>
                    </div>
                    <div class="col-span-4 space-y-6">
                        <div class="glass-card p-6 rounded-2xl border-sky-500/20 bg-sky-500/5">
                            <h4 class="text-[10px] font-bold text-sky-500 mb-4 uppercase tracking-widest">实时情报简讯</h4>
                            <div id="anaInsight" class="text-sm leading-relaxed text-slate-400 font-medium">---</div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script>
        const teamMap = {
            'Arsenal': '阿森纳', 'Liverpool': '利物浦', 'Manchester City': '曼城', 'Real Madrid': '皇马', 'Barcelona': '巴萨',
            'Bayern Munich': '拜仁', 'Inter Milan': '国米', 'AC Milan': 'AC米兰', 'Chelsea': '切尔西', 'Manchester United': '曼联'
            // ... 可根据需要继续添加
        };

        const leagueMap = {
            'soccer_epl': '英超联赛', 'soccer_spain_la_liga': '西甲联赛',
            'soccer_germany_bundesliga': '德甲联赛', 'soccer_italy_serie_a': '意甲联赛',
            'soccer_france_ligue_1': '法甲联赛'
        };

        function translate(name) { return teamMap[name] || name; }

        async function fetchFixtures() {
            const container = document.getElementById('fixtureList');
            try {
                const response = await fetch('/api/data');
                const data = await response.json();
                
                if (data && data.length > 0) {
                    container.innerHTML = "";
                    document.getElementById('matchCount').textContent = `${data.length} 场`;
                    
                    data.forEach((match, index) => {
                        const isBigFive = Object.keys(leagueMap).includes(match.sport_key);
                        const hasOdds = match.bookmakers && match.bookmakers.length > 0;
                        
                        const card = document.createElement('div');
                        card.className = `match-card p-4 rounded-xl border cursor-pointer transition-all hover:scale-[1.02] ${isBigFive ? 'bg-slate-800/40 border-sky-500/30 shadow-[0_0_15px_rgba(14,165,233,0.1)]' : 'bg-slate-900/20 border-slate-800/50 opacity-70 hover:opacity-100'}`;
                        card.style.animationDelay = `${index * 0.02}s`;
                        
                        card.onclick = () => hasOdds ? selectMatch(match) : alert("该比赛暂未获取到赔率数据");
                        
                        card.innerHTML = `
                            <div class="flex justify-between items-center mb-2">
                                <span class="text-[9px] font-bold ${isBigFive ? 'text-sky-400' : 'text-slate-500'} uppercase tracking-widest">${leagueMap[match.sport_key] || match.sport_title}</span>
                                <span class="text-[10px] text-slate-600 mono">${new Date(match.commence_time).toLocaleString('zh-CN', {month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit'})}</span>
                            </div>
                            <div class="flex justify-between items-center">
                                <span class="font-bold text-sm text-slate-200">${translate(match.home_team)}</span>
                                <span class="text-[9px] text-slate-700 font-black">VS</span>
                                <span class="font-bold text-sm text-slate-200 text-right">${translate(match.away_team)}</span>
                            </div>
                            <div class="mt-3 flex justify-between items-center">
                                <div class="text-[8px] text-slate-600 mono tracking-tighter">ID: ${match.sport_key}</div>
                                ${hasOdds ? '<div class="w-1 h-1 rounded-full bg-green-500 animate-pulse"></div>' : ''}
                            </div>
                        `;
                        container.appendChild(card);
                    });
                }
            } catch (e) {
                container.innerHTML = `<div class="p-10 text-red-900 text-[10px] text-center">后端连接超时</div>`;
            }
        }

        let fittingChart = null;

        function selectMatch(match) {
            document.getElementById('welcomeMessage').classList.add('hidden');
            document.getElementById('analysisDashboard').classList.remove('hidden');
            document.getElementById('anaTeams').textContent = `${translate(match.home_team)} VS ${translate(match.away_team)}`;
            document.getElementById('anaLeague').textContent = leagueMap[match.sport_key] || match.sport_title;
            document.getElementById('anaTime').textContent = `MATCH START: ${new Date(match.commence_time).toLocaleString()}`;
            
            const wh = match.bookmakers.find(b => b.key === 'williamhill')?.markets[0].outcomes[0].price || 2.0;
            const pin = match.bookmakers.find(b => b.key === 'pinnacle')?.markets[0].outcomes[0].price || 1.95;
            
            const div = (wh - pin).toFixed(2);
            document.getElementById('anaDivIdx').textContent = div;
            document.getElementById('anaInsight').innerHTML = `大众博彩 (WilliamHill) 现报 <span class="text-sky-400">${wh}</span>。专业机构 (Pinnacle) 报 <span class="text-emerald-400">${pin}</span>。拟合差值已达 <span class="text-white">${div}</span>，建议同步监控临场水位变化。`;
            
            updateCharts([wh+0.05, wh+0.02, wh], [pin+0.1, pin+0.04, pin]);
        }

        function updateCharts(d1, d2) {
            const ctx = document.getElementById('liveFittingChart').getContext('2d');
            if (fittingChart) fittingChart.destroy();
            fittingChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['初始', '即时', '临场'],
                    datasets: [
                        { label: '大众水位', data: d1, borderColor: '#334155', tension: 0.4, borderDash: [4, 4] },
                        { label: '专业水位', data: d2, borderColor: '#10b981', borderWidth: 3, tension: 0.4, fill: true, backgroundColor: 'rgba(16, 185, 129, 0.05)' }
                    ]
                },
                options: { 
                    responsive: true, 
                    maintainAspectRatio: false,
                    scales: { 
                        y: { grid: { color: '#111' }, ticks: { color: '#444' } },
                        x: { grid: { display: false }, ticks: { color: '#444' } }
                    },
                    plugins: { legend: { display: false } }
                }
            });
        }

        window.onload = () => {
            fetchFixtures();
            setInterval(() => document.getElementById('clock').textContent = new Date().toLocaleTimeString(), 1000);
            setInterval(fetchFixtures, 3 * 60 * 1000);
        };
    </script>
</body>
</html>
