<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Quantum League V4.1 | 精算定价终端</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        body { background: #020617; color: #f8fafc; height: 100vh; overflow: hidden; font-family: system-ui, -apple-system, sans-serif; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        
        /* 布局锁定 */
        aside { width: 380px; min-width: 380px; flex-shrink: 0; background: rgba(15, 23, 42, 0.3); }
        .scroll-v { overflow-y: auto; height: calc(100vh - 56px); }
        .scroll-v::-webkit-scrollbar { width: 4px; }
        .scroll-v::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }

        #dashboard { max-width: 1200px; margin: 0 auto; padding: 40px; }
        .chart-container { position: relative; height: 400px; width: 100%; background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(56, 189, 248, 0.1); border-radius: 24px; padding: 24px; }

        .match-card { border: 1px solid rgba(56, 189, 248, 0.05); background: rgba(30, 41, 59, 0.2); transition: 0.2s; }
        .match-card:hover { border-color: #38bdf8; background: rgba(56, 189, 248, 0.1); }
        .active-card { border-color: #38bdf8 !important; background: rgba(56, 189, 248, 0.2) !important; }
    </style>
</head>
<body class="flex flex-col">

    <header class="h-14 border-b border-slate-800 flex items-center justify-between px-6 bg-slate-950/90 z-10">
        <div class="flex items-center gap-4">
            <span class="bg-emerald-500 text-black text-[10px] font-black px-2 py-0.5 rounded italic">ACTUARIAL ENGINE V4.1</span>
            <span id="clock" class="text-xs text-slate-500 mono">--:--:--</span>
        </div>
        <div class="text-[10px] text-sky-400 font-bold uppercase tracking-widest">申氏内幕模型 & 幂次变换拟合</div>
    </header>

    <main class="flex-1 flex overflow-hidden">
        <aside class="border-r border-slate-800">
            <div id="fixtureList" class="scroll-v p-4 space-y-3">
                <div class="py-20 text-center text-slate-700 animate-pulse text-[10px] uppercase">正在同步 48H 赛程...</div>
            </div>
        </aside>

        <section class="flex-1 bg-[#020617] overflow-y-auto">
            <div id="welcome" class="h-full flex flex-col items-center justify-center opacity-10">
                <div class="text-6xl mb-4">⚖️</div>
                <p class="tracking-[0.5em] text-[10px]">等待量化目标选择</p>
            </div>

            <div id="dashboard" class="hidden">
                <div class="flex justify-between items-end mb-10 pb-8 border-b border-slate-800/50">
                    <div>
                        <div id="mLeague" class="text-sky-500 text-[10px] font-black mb-3 tracking-[0.2em] uppercase">---</div>
                        <h2 id="mTeams" class="text-4xl font-black italic tracking-tighter uppercase text-slate-100">---</h2>
                        <div id="mTime" class="text-xs text-slate-500 mt-4 mono tracking-widest">---</div>
                    </div>
                    <div class="text-right">
                        <div class="text-[9px] text-slate-500 mb-2 font-bold uppercase tracking-widest">D-INDEX (精算偏差)</div>
                        <div id="mDiff" class="text-6xl font-black text-emerald-400 mono leading-none">0.00</div>
                    </div>
                </div>
                
                <div class="grid grid-cols-1 gap-8">
                    <div class="chart-container">
                        <canvas id="chart"></canvas>
                    </div>
                    
                    <div class="grid grid-cols-3 gap-6">
                        <div class="bg-slate-900/40 p-6 rounded-2xl border border-slate-800">
                            <div class="text-[9px] text-slate-500 mb-2 uppercase font-bold italic">WH 幂次去税价</div>
                            <div id="p-wh" class="text-2xl font-black mono text-slate-200">--</div>
                        </div>
                        <div class="bg-slate-900/40 p-6 rounded-2xl border border-slate-800">
                            <div class="text-[9px] text-emerald-500/80 mb-2 uppercase font-bold italic">PIN 申氏共识价</div>
                            <div id="p-pin" class="text-2xl font-black mono text-emerald-400">--</div>
                        </div>
                        <div class="bg-sky-500/5 p-6 rounded-2xl border border-sky-500/20">
                            <div class="text-[9px] text-sky-500 mb-2 uppercase font-bold">精算诊断</div>
                            <div id="mInsight" class="text-xs text-slate-400 italic font-medium leading-relaxed">等待分析结果...</div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script>
        // 1. 汉化字典
        const teamMap = {
            // 英超
            'Arsenal': '阿森纳', 'Liverpool': '利物浦', 'Manchester City': '曼城', 'Manchester United': '曼联',
            'Chelsea': '切尔西', 'Tottenham Hotspur': '热刺', 'Newcastle United': '纽卡斯尔联', 'Aston Villa': '阿斯顿维拉',
            'West Ham United': '西汉姆联', 'Brighton and Hove Albion': '布莱顿', 'Everton': '埃弗顿', 'Fulham': '富勒姆',
            'Brentford': '布伦特福德', 'Crystal Palace': '水晶宫', 'Wolverhampton Wanderers': '狼队', 'Bournemouth': '伯恩茅斯',
            // 西甲
            'Real Madrid': '皇家马德里', 'Barcelona': '巴塞罗那', 'Atlético Madrid': '马德里竞技', 'Real Sociedad': '皇家社会',
            'Villarreal': '比利亚雷亚尔', 'Sevilla': '塞维利亚', 'Athletic Bilbao': '毕尔巴鄂竞技', 'Girona': '赫罗纳', 'Mallorca': '皇家马略卡',
            'Real Betis': '皇家贝蒂斯', 'Valencia': '瓦伦西亚', 'CA Osasuna': '奥萨苏纳', 'Getafe': '赫塔费', 'Celta Vigo': '塞尔塔','Levante': '莱万特',
            // 德甲
            'Bayern Munich': '拜仁慕尼黑', 'Bayer Leverkusen': '勒沃库森', 'Borussia Dortmund': '多特蒙德', 'RB Leipzig': 'RB莱比锡', 'Hamburger SV': '汉堡','FC Köln': '科隆',
            'Eintracht Frankfurt': '法兰克福', 'VfL Wolfsburg': '沃尔夫斯堡', 'VfB Stuttgart': '斯图加特', 'Werder Bremen': '不莱梅','FC Heidenheim': '海德海姆',
            'SC Freiburg': '弗赖堡', 'TSG Hoffenheim': '霍芬海姆', 'FSV Mainz 05': '美因茨', 'Augsburg': '奥格斯堡', 'Borussia Monchengladbach': '门兴格拉德巴赫',
            // 意甲 
            'Juventus': '尤文图斯', 'AC Milan': 'AC米兰', 'Inter Milan': '国际米兰', 'Napoli': '那不勒斯', 'Roma': '罗马', 'Cagliari': '卡利亚里', 'Como': '科莫',
            'Lazio': '拉齐奥', 'Atalanta BC': '亚特兰大', 'Fiorentina': '佛罗伦萨', 'Bologna': '博洛尼亚', 'Torino': '都灵', 'Udinese': '乌迪内斯','Pisa': '比萨',
            // 法甲
            'Paris Saint Germain': '巴黎圣日耳曼', 'Monaco': '摩纳哥', 'Lyon': '里昂', 'Marseille': '马赛', 'Lille': '里尔', 'Nice': '尼斯'
        };


        const leagueMap = {
            'soccer_epl': '英超联赛', 'soccer_spain_la_liga': '西甲联赛',
            'soccer_germany_bundesliga': '德甲联赛', 'soccer_italy_serie_a': '意甲联赛',
            'soccer_france_ligue_1': '法甲联赛'
        };

        // 2. 数学精算模块
        function devigPower(odds) {
            const impliedProb = odds.map(o => 1 / o);
            let k = 1.0;
            for (let i = 0; i < 20; i++) {
                const sum = impliedProb.reduce((a, b) => a + Math.pow(b, 1/k), 0);
                k = k * sum;
            }
            return impliedProb.map(p => Math.pow(p, 1/k));
        }

        function devigShin(odds) {
            const r = odds.map(o => 1 / o);
            const sumR = r.reduce((a, b) => a + b, 0);
            return r.map(prob => prob / sumR); // 申氏逻辑简化实现
        }

        // 3. 数据交互与展示
        async function update() {
            const list = document.getElementById('fixtureList');
            try {
                const res = await fetch('/api/data');
                const data = await res.json();
                list.innerHTML = "";
                data.forEach(m => {
                    const date = new Date(m.commence_time);
                    const timeStr = `${date.getMonth()+1}/${date.getDate()} ${date.getHours().toString().padStart(2,'0')}:${date.getMinutes().toString().padStart(2,'0')}`;
                    const h = teamMap[m.home_team] || m.home_team;
                    const a = teamMap[m.away_team] || m.away_team;
                    const l = leagueMap[m.sport_key] || m.sport_title;

                    const card = document.createElement('div');
                    card.className = "match-card p-5 rounded-2xl cursor-pointer";
                    card.onclick = () => {
                        document.querySelectorAll('.match-card').forEach(c => c.classList.remove('active-card'));
                        card.classList.add('active-card');
                        showMatch(m, h, a, l);
                    };
                    card.innerHTML = `
                        <div class="flex justify-between items-center mb-2">
                            <span class="text-[9px] font-black text-sky-500 uppercase">${l}</span>
                            <span class="text-[10px] text-slate-600 mono">${timeStr}</span>
                        </div>
                        <div class="text-sm font-bold text-slate-200">${h} VS ${a}</div>
                    `;
                    list.appendChild(card);
                });
            } catch (e) { list.innerHTML = "Sync Error"; }
        }

        let myChart = null;
        function showMatch(m, h, a, l) {
            document.getElementById('welcome').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            document.getElementById('mTeams').textContent = `${h} VS ${a}`;
            document.getElementById('mLeague').textContent = l;
            document.getElementById('mTime').textContent = `START: ${new Date(m.commence_time).toLocaleString()}`;
            
            const whBook = m.bookmakers.find(b => b.key === 'williamhill');
            const pinBook = m.bookmakers.find(b => b.key === 'pinnacle');

            if (!whBook || !pinBook) {
                document.getElementById('mInsight').textContent = "数据源不足（缺失 WH 或 PIN）";
                return;
            }

            const whRaw = whBook.markets[0].outcomes.map(o => o.price);
            const pinRaw = pinBook.markets[0].outcomes.map(o => o.price);

            const whFairProbs = devigPower(whRaw);
            const pinFairProbs = devigShin(pinRaw);

            const whFairWin = (1 / whFairProbs[0]).toFixed(2);
            const pinFairWin = (1 / pinFairProbs[0]).toFixed(2);
            
            document.getElementById('p-wh').textContent = whFairWin;
            document.getElementById('p-pin').textContent = pinFairWin;
            
            const diff = (whFairWin - pinFairWin).toFixed(2);
            document.getElementById('mDiff').textContent = diff;
            
            let insight = "";
            if (diff > 0.15) insight = "🚨 严重低估：威廉定价显著高于平博精算价，存在价值边缘。";
            else if (diff < -0.15) insight = "⚠️ 诱导警示：威廉定价远低于精算共识，谨防热度陷阱。";
            else insight = "✅ 步调一致：两家机构对去税概率的看法高度趋同。";
            document.getElementById('mInsight').textContent = insight;

            renderChart(whRaw[0], whFairWin, pinFairWin);
        }

        function renderChart(raw, power, shin) {
            const ctx = document.getElementById('chart').getContext('2d');
            if (myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['WH 原始', 'WH 幂次拟合', 'PIN 申氏精算'],
                    datasets: [{
                        label: '主胜赔率对照',
                        data: [raw, parseFloat(power), parseFloat(shin)],
                        backgroundColor: ['#1e293b', '#38bdf8', '#10b981'],
                        borderRadius: 12,
                        barThickness: 40
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { 
                        y: { 
                            beginAtZero: false, 
                            min: Math.min(raw, power, shin) - 0.2,
                            grid: { color: '#0f172a' },
                            ticks: { color: '#475569' }
                        },
                        x: { grid: { display: false }, ticks: { color: '#475569' } }
                    }
                }
            });
        }

        window.onload = () => {
            update();
            setInterval(() => document.getElementById('clock').textContent = new Date().toLocaleTimeString(), 1000);
        };
    </script>
</body>
</html>
