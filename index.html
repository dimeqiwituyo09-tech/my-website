<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum League 2.5 | 顶级联赛量化终端</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #f8fafc; height: 100vh; overflow: hidden; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        
        /* 强制滚动条样式 */
        .scroll-v { overflow-y: auto !important; height: calc(100vh - 120px); }
        .scroll-v::-webkit-scrollbar { width: 4px; }
        .scroll-v::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .big-five-glow { border-color: rgba(14, 165, 233, 0.5) !important; box-shadow: 0 0 20px rgba(14, 165, 233, 0.1); }
    </style>
</head>
<body class="flex flex-col">

    <header class="h-14 border-b border-slate-800 flex items-center justify-between px-6 bg-slate-950/50">
        <div class="flex items-center gap-4">
            <span class="bg-sky-500 text-black text-[10px] font-black px-2 py-0.5 rounded italic">QUANTUM ANALYST V2.5</span>
            <span id="clock" class="text-xs text-slate-500 mono">00:00:00</span>
        </div>
        <div class="flex items-center gap-3">
            <span class="text-[10px] text-emerald-400 font-bold bg-emerald-500/10 px-2 py-1 rounded border border-emerald-500/20 uppercase">● 实时链路已连接</span>
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden">
        <aside class="w-[400px] border-r border-slate-800 flex flex-col">
            <div class="p-4 border-b border-slate-800 bg-slate-900/20 flex justify-between items-center">
                <span class="text-xs font-bold text-slate-400 tracking-widest uppercase text-sky-500">赛程流水探测</span>
                <span id="matchCount" class="text-[10px] text-slate-600 mono">0 UNITS</span>
            </div>
            
            <div id="fixtureList" class="scroll-v p-3 space-y-3 bg-black/20">
                <div class="py-20 text-center text-slate-700 animate-pulse text-xs uppercase tracking-tighter">Scanning Satellites...</div>
            </div>
        </aside>

        <section class="flex-1 flex flex-col bg-[#020617]">
            <div id="welcomeMessage" class="flex-1 flex flex-col items-center justify-center opacity-30">
                <div class="text-6xl mb-4">🛰️</div>
                <p class="text-xs tracking-[0.5em] font-light">SELECT A UNIT TO DECRYPT</p>
            </div>

            <div id="dashboard" class="hidden flex-1 p-8 overflow-y-auto">
                <div class="flex justify-between items-start mb-10">
                    <div>
                        <div id="mLeague" class="text-sky-500 text-[10px] font-black uppercase tracking-[0.3em] mb-2">---</div>
                        <h2 id="mTeams" class="text-4xl font-black italic tracking-tighter uppercase text-slate-100">---</h2>
                        <div id="mTime" class="text-xs text-slate-500 mt-4 mono tracking-widest uppercase">---</div>
                    </div>
                    <div class="text-right glass p-6 rounded-2xl">
                        <div class="text-[10px] text-slate-500 mb-1 font-bold uppercase tracking-widest">偏差指数 D-INDEX</div>
                        <div id="mDiff" class="text-5xl font-black text-emerald-400 mono leading-none">0.00</div>
                    </div>
                </div>

                <div class="grid grid-cols-12 gap-6">
                    <div class="col-span-8 glass p-6 rounded-3xl">
                        <h3 class="text-[10px] text-slate-500 font-bold mb-6 uppercase tracking-widest">机构价格拟合曲线 (WILL vs PINN)</h3>
                        <div style="height: 300px;"><canvas id="chart"></canvas></div>
                    </div>
                    <div class="col-span-4 space-y-6">
                        <div class="glass p-6 rounded-3xl border-sky-500/20 bg-sky-500/5">
                            <h4 class="text-[10px] text-sky-500 font-black mb-4 uppercase tracking-[0.2em]">智能情报分析</h4>
                            <div id="mInsight" class="text-sm text-slate-400 leading-relaxed font-medium italic">---</div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script>
        const leagueMap = {
            'soccer_epl': '英超联赛', 'soccer_spain_la_liga': '西甲联赛',
            'soccer_germany_bundesliga': '德甲联赛', 'soccer_italy_serie_a': '意甲联赛',
            'soccer_france_ligue_1': '法甲联赛', 'soccer_uefa_champs_league': '欧冠联赛'
        };

      async function fetchFixtures() {
    const container = document.getElementById('fixtureList');
    try {
        const res = await fetch('/api/data');
        const data = await res.json();
        
        if (data && data.length > 0) {
            container.innerHTML = "";
            document.getElementById('matchCount').textContent = `${data.length} 序列`;
            
            data.forEach((m) => {
                const sKey = m.sport_key.toLowerCase();
                const isBig = ['soccer_epl', 'soccer_spain_la_liga', 'soccer_germany_bundesliga', 'soccer_italy_serie_a', 'soccer_france_ligue_1', 'soccer_uefa_champs_league'].includes(sKey);
                
                const startTime = new Date(m.commence_time);
                // 格式化日期：显示 "03/07 03:00"
                const timeStr = `${(startTime.getMonth()+1).toString().padStart(2,'0')}/${startTime.getDate().toString().padStart(2,'0')} ${startTime.getHours().toString().padStart(2,'0')}:${startTime.getMinutes().toString().padStart(2,'0')}`;

                const card = document.createElement('div');
                card.className = `p-4 rounded-xl border transition-all cursor-pointer hover:bg-slate-800/60 ${isBig ? 'border-sky-500/50 bg-slate-900/40' : 'border-slate-800 opacity-40'}`;
                
                card.onclick = () => selectMatch(m);
                card.innerHTML = `
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-[9px] font-black ${isBig ? 'text-sky-400' : 'text-slate-500'} uppercase tracking-widest">${m.sport_title}</span>
                        <span class="text-[10px] text-slate-400 mono font-bold">${timeStr}</span>
                    </div>
                    <div class="flex justify-between text-sm font-bold text-slate-100">
                        <span class="truncate w-24">${m.home_team}</span>
                        <span class="text-slate-700 font-black text-[10px] mx-2">VS</span>
                        <span class="truncate w-24 text-right">${m.away_team}</span>
                    </div>
                `;
                container.appendChild(card);
            });
        }
    } catch (e) {
        console.error("加载失败");
    }
}

        let chartObj = null;

        function selectMatch(m) {
            document.getElementById('welcomeMessage').classList.add('hidden');
            const dash = document.getElementById('dashboard');
            dash.classList.remove('hidden');
            
            document.getElementById('mTeams').textContent = `${m.home_team} VS ${m.away_team}`;
            document.getElementById('mLeague').textContent = m.sport_title;
            document.getElementById('mTime').textContent = `T-DEPARTURE: ${new Date(m.commence_time).toLocaleString()}`;
            
            const wh = m.bookmakers.find(b => b.key === 'williamhill')?.markets[0].outcomes[0].price || 0;
            const pin = m.bookmakers.find(b => b.key === 'pinnacle')?.markets[0].outcomes[0].price || 0;
            
            const diff = (wh - pin).toFixed(2);
            document.getElementById('mDiff').textContent = diff;
            document.getElementById('mInsight').textContent = `[分析结果] 威廉现价 ${wh}，平博参考价 ${pin}。${diff > 0.1 ? '检测到显著机构对冲，建议关注资金流向。' : '价格处于平衡区间。'}`;
            
            drawChart([wh + 0.1, wh + 0.05, wh], [pin + 0.15, pin + 0.08, pin]);
        }

        function drawChart(d1, d2) {
            const ctx = document.getElementById('chart').getContext('2d');
            if (chartObj) chartObj.destroy();
            chartObj = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['OPEN', 'MID', 'LIVE'],
                    datasets: [
                        { label: 'Market', data: d1, borderColor: '#1e293b', borderDash: [5,5], tension: 0.4 },
                        { label: 'Pro', data: d2, borderColor: '#10b981', borderWidth: 3, tension: 0.4, fill: true, backgroundColor: 'rgba(16, 185, 129, 0.05)' }
                    ]
                },
                options: { 
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { 
                        y: { grid: { color: '#0f172a' }, ticks: { color: '#475569', font: { size: 10 } } },
                        x: { grid: { display: false }, ticks: { color: '#475569', font: { size: 10 } } }
                    }
                }
            });
        }

        window.onload = () => {
            fetchFixtures();
            setInterval(() => document.getElementById('clock').textContent = new Date().toLocaleTimeString(), 1000);
        };
    </script>
</body>
</html>
