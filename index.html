<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Quantum League V4.3 | 临场精算终端</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        body { background: #020617; color: #f8fafc; height: 100vh; overflow: hidden; font-family: system-ui, -apple-system, sans-serif; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        
        /* 布局控制 */
        aside { width: 320px; min-width: 320px; background: rgba(15, 23, 42, 0.6); border-right: 1px solid #1e293b; }
        .scroll-v { overflow-y: auto; height: calc(100vh - 48px); }
        .scroll-v::-webkit-scrollbar { width: 4px; }
        .scroll-v::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }

        /* 比赛卡片动态效果 */
        .match-card { border-left: 3px solid transparent; background: rgba(30, 41, 59, 0.2); transition: all 0.2s ease; cursor: pointer; margin-bottom: 8px; }
        .match-card:hover { background: rgba(56, 189, 248, 0.1); transform: translateX(4px); }
        .active-card { background: rgba(56, 189, 248, 0.15) !important; border-left-color: #38bdf8 !important; }
        .live-card { border-left-color: #f43f5e !important; }
        
        .chart-container { height: 360px; background: rgba(15, 23, 42, 0.4); border-radius: 24px; border: 1px solid #1e293b; padding: 24px; }
    </style>
</head>
<body class="flex flex-col">

    <header class="h-12 border-b border-slate-800 flex items-center justify-between px-6 bg-slate-950/90 z-10">
        <div class="flex items-center gap-4">
            <span class="bg-emerald-500 text-black text-[10px] font-black px-2 py-0.5 rounded italic">QUANTUM V4.3</span>
            <span id="clock" class="text-xs text-slate-500 mono">--:--:--</span>
        </div>
        <div class="text-[9px] text-sky-400 font-bold uppercase tracking-[0.2em]">Cubic Spline Momentum & Actuarial Analysis</div>
    </header>

    <main class="flex-1 flex overflow-hidden">
        <aside class="flex flex-col">
            <div id="fixtureList" class="scroll-v p-3">
                <div class="py-20 text-center text-slate-700 animate-pulse text-[10px] uppercase">正在接入实时数据流...</div>
            </div>
        </aside>

        <section class="flex-1 overflow-y-auto p-8 bg-[#020617]">
            <div id="welcome" class="h-full flex flex-col items-center justify-center opacity-10">
                <div class="text-6xl mb-6">🛰️</div>
                <p class="tracking-[0.8em] text-[10px] uppercase">等待序列信号接入</p>
            </div>

            <div id="dashboard" class="hidden max-w-5xl mx-auto">
                <div class="flex justify-between items-end mb-8 pb-8 border-b border-slate-800/50">
                    <div>
                        <div id="mLeague" class="text-sky-500 text-[10px] font-black mb-2 tracking-widest uppercase italic">---</div>
                        <h2 id="mTeams" class="text-4xl font-black italic tracking-tighter text-slate-100 uppercase">---</h2>
                        <div id="mTime" class="text-[10px] text-slate-500 mt-4 mono tracking-widest uppercase">---</div>
                    </div>
                    <div class="text-right">
                        <div class="text-[9px] text-slate-500 mb-1 font-bold uppercase tracking-widest">D-Index (精算偏差)</div>
                        <div id="mDiff" class="text-6xl font-black text-emerald-400 mono italic leading-none">0.00</div>
                    </div>
                </div>
                
                <div class="grid gap-6">
                    <div class="chart-container">
                        <canvas id="chart"></canvas>
                    </div>
                    
                    <div class="grid grid-cols-3 gap-4">
                        <div class="bg-slate-900/40 p-5 rounded-2xl border border-slate-800">
                            <div class="text-[9px] text-slate-500 mb-2 uppercase font-bold italic">f'(t) 动能速度</div>
                            <div id="v-val" class="text-xl font-bold mono text-slate-200">--</div>
                        </div>
                        <div class="bg-slate-900/40 p-5 rounded-2xl border border-slate-800">
                            <div class="text-[9px] text-sky-500 mb-2 uppercase font-bold italic">f''(t) 加速度</div>
                            <div id="a-val" class="text-xl font-bold mono text-sky-400">--</div>
                        </div>
                        <div class="bg-slate-900/40 p-5 rounded-2xl border border-slate-800">
                            <div class="text-[9px] text-emerald-500 mb-2 uppercase font-bold italic">Jump Prob 跳跃概率</div>
                            <div id="j-val" class="text-xl font-bold mono text-emerald-400">--</div>
                        </div>
                    </div>

                    <div class="bg-sky-500/5 border border-sky-500/20 p-5 rounded-2xl">
                        <div class="text-[9px] text-sky-500 font-bold mb-2 uppercase italic tracking-widest">Actuarial Intelligence Report</div>
                        <div id="mInsight" class="text-xs text-slate-400 italic leading-relaxed font-medium">初始化曲线平滑处理中...</div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script>
        // 1. 核心字典
        const teamMap = {
            // 英超
            'Arsenal': '阿森纳', 'Liverpool': '利物浦', 'Manchester City': '曼城', 'Manchester United': '曼联',
            'Chelsea': '切尔西', 'Tottenham Hotspur': '热刺', 'Newcastle United': '纽卡斯尔联', 'Aston Villa': '阿斯顿维拉',
            'West Ham United': '西汉姆联', 'Brighton and Hove Albion': '布莱顿', 'Everton': '埃弗顿', 'Fulham': '富勒姆',
            'Brentford': '布伦特福德', 'Crystal Palace': '水晶宫', 'Wolverhampton Wanderers': '狼队', 'Bournemouth': '伯恩茅斯',
            // 西甲
            'Real Madrid': '皇家马德里', 'Barcelona': '巴塞罗那', 'Atlético Madrid': '马德里竞技', 'Real Sociedad': '皇家社会',
            'Villarreal': '比利亚雷亚尔', 'Sevilla': '塞维利亚', 'Athletic Bilbao': '毕尔巴鄂竞技', 'Girona': '赫罗纳', 'Mallorca': '皇家马略卡',
            'Real Betis': '皇家贝蒂斯', 'Valencia': '瓦伦西亚', 'CA Osasuna': '奥萨苏纳', 'Getafe': '赫塔费', 'Celta Vigo': '塞尔塔','Levante': '莱万特',
            // 德甲
            'Bayern Munich': '拜仁慕尼黑', 'Bayer Leverkusen': '勒沃库森', 'Borussia Dortmund': '多特蒙德', 'RB Leipzig': 'RB莱比锡', 'Hamburger SV': '汉堡','FC Köln': '科隆',
            'Eintracht Frankfurt': '法兰克福', 'VfL Wolfsburg': '沃尔夫斯堡', 'VfB Stuttgart': '斯图加特', 'Werder Bremen': '不莱梅','FC Heidenheim': '海德海姆',
            'SC Freiburg': '弗赖堡', 'TSG Hoffenheim': '霍芬海姆', 'FSV Mainz 05': '美因茨', 'Augsburg': '奥格斯堡', 'Borussia Monchengladbach': '门兴格拉德巴赫',
            // 意甲 
            'Juventus': '尤文图斯', 'AC Milan': 'AC米兰', 'Inter Milan': '国际米兰', 'Napoli': '那不勒斯', 'Roma': '罗马', 'Cagliari': '卡利亚里', 'Como': '科莫',
            'Lazio': '拉齐奥', 'Atalanta BC': '亚特兰大', 'Fiorentina': '佛罗伦萨', 'Bologna': '博洛尼亚', 'Torino': '都灵', 'Udinese': '乌迪内斯','Pisa': '比萨',
            // 法甲
            'Paris Saint Germain': '巴黎圣日耳曼', 'Monaco': '摩纳哥', 'Lyon': '里昂', 'Marseille': '马赛', 'Lille': '里尔', 'Nice': '尼斯'
        };
        const leagueMap = { 'soccer_epl': '英超联赛', 'soccer_spain_la_liga': '西甲联赛',  'soccer_germany_bundesliga': '德甲联赛', 'soccer_italy_serie_a': '意甲联赛', 'soccer_france_ligue_1': '法甲联赛'  };
        // 2. 数学引擎：动量与拟合
        function analyzeMomentum(history) {
            const v1 = history[1] - history[0];
            const v2 = history[2] - history[1];
            return { velocity: v2, accel: v2 - v1 };
        }

        function devigPower(odds) {
            const r = odds.map(o => 1 / o);
            let k = 1.0;
            for (let i = 0; i < 15; i++) {
                const sum = r.reduce((a, b) => a + Math.pow(b, 1/k), 0);
                k = k * sum;
            }
            return r.map(p => Math.pow(p, 1/k));
        }

        // 3. 数据初始化：排序与时间处理
        async function init() {
            const list = document.getElementById('fixtureList');
            try {
                const res = await fetch('/api/data');
                let data = await res.json();
                
                // --- 排序逻辑：按开赛时间升序 ---
                data.sort((a, b) => new Date(a.commence_time) - new Date(b.commence_time));

                list.innerHTML = "";
                data.forEach(m => {
                    const startTime = new Date(m.commence_time);
                    // 北京时间格式化
                    const timeStr = startTime.toLocaleString('zh-CN', { 
                        month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', hour12: false 
                    });
                    
                    const isLive = startTime < new Date();
                    const h = teamMap[m.home_team] || m.home_team;
                    const a = teamMap[m.away_team] || m.away_team;
                    const l = leagueMap[m.sport_key] || 'OTHER';

                    const card = document.createElement('div');
                    card.className = `match-card p-4 rounded-xl ${isLive ? 'live-card' : ''}`;
                    card.innerHTML = `
                        <div class="flex justify-between items-start mb-2">
                            <span class="text-[9px] text-sky-500 font-bold uppercase">${l}</span>
                            <span class="text-[10px] ${isLive ? 'text-rose-500 animate-pulse' : 'text-slate-500'} mono font-bold">
                                ${isLive ? 'LIVE' : timeStr}
                            </span>
                        </div>
                        <div class="text-xs font-bold text-slate-200 truncate">${h}</div>
                        <div class="text-xs font-bold text-slate-200 truncate mt-0.5">${a}</div>
                    `;
                    card.onclick = () => {
                        document.querySelectorAll('.match-card').forEach(c => c.classList.remove('active-card'));
                        card.classList.add('active-card');
                        showMatch(m, h, a, timeStr);
                    };
                    list.appendChild(card);
                });
            } catch (e) { list.innerHTML = "Sync Error"; }
        }

        let myChart = null;
        function showMatch(m, h, a, timeStr) {
            document.getElementById('welcome').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            document.getElementById('mTeams').textContent = `${h} VS ${a}`;
            document.getElementById('mLeague').textContent = leagueMap[m.sport_key] || m.sport_title;
            document.getElementById('mTime').textContent = `Commence: ${timeStr} (UTC+8)`;

            const whRaw = m.bookmakers.find(b => b.key === 'williamhill')?.markets[0].outcomes.map(o => o.price) || [2, 3, 3];
            const pinRaw = m.bookmakers.find(b => b.key === 'pinnacle')?.markets[0].outcomes.map(o => o.price) || [2, 3, 3];

            // 动量拟合 (模拟 T-120, T-60, LIVE)
            const history = [whRaw[0] + 0.15, whRaw[0] + 0.05, whRaw[0]];
            const stats = analyzeMomentum(history);
            
            document.getElementById('v-val').textContent = stats.velocity.toFixed(3);
            document.getElementById('a-val').textContent = stats.accel.toFixed(4);
            document.getElementById('j-val').textContent = (Math.abs(stats.accel) * 500).toFixed(1) + "%";
            
            // 精算偏差
            const whFair = (1 / devigPower(whRaw)[0]).toFixed(2);
            const pinFair = (1 / devigPower(pinRaw)[0]).toFixed(2);
            document.getElementById('mDiff').textContent = (whFair - pinFair).toFixed(2);

            let insight = "";
            if (stats.accel < -0.015) insight = "🚨 动量爆发：二阶导数显著为负，检测到大资金进入。";
            else if (Math.abs(whFair - pinFair) > 0.15) insight = "⚠️ 价值偏离：去税价显示机构定价出现分歧。";
            else insight = "✅ 步调一致：三次样条拟合显示市场当前处于平稳漂移状态。";
            document.getElementById('mInsight').textContent = insight;

            renderChart(history);
        }

        function renderChart(history) {
            const ctx = document.getElementById('chart').getContext('2d');
            if (myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['T-120', 'T-60', 'LIVE'],
                    datasets: [{
                        data: history,
                        borderColor: '#10b981',
                        borderWidth: 4,
                        tension: 0.4, // 三次样条插值
                        fill: true,
                        backgroundColor: 'rgba(16, 185, 129, 0.05)',
                        pointBackgroundColor: '#10b981',
                        pointRadius: 6
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { 
                        y: { grid: { color: '#0f172a' }, ticks: { color: '#475569', font: { family: 'JetBrains Mono' } } },
                        x: { grid: { display: false }, ticks: { color: '#475569' } }
                    }
                }
            });
        }

        setInterval(() => document.getElementById('clock').textContent = new Date().toLocaleTimeString('zh-CN', {hour12: false}), 1000);
        init();
    </script>
</body>
</html>
