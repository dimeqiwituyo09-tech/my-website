<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum League 2026 量化监控</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        body { font-family: 'Inter', 'Microsoft YaHei', sans-serif; background-color: #050505; color: #e2e8f0; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .scroll-v::-webkit-scrollbar { width: 6px; }
        .scroll-v::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen flex flex-col overflow-hidden text-lg">

    <header class="h-20 border-b border-slate-800 flex items-center justify-between px-8 bg-black/50">
        <div class="flex items-center gap-6">
            <div class="bg-sky-500 text-black px-3 py-1.5 rounded font-black text-base italic">量子实盘监控</div>
            <div class="text-sm text-slate-400">系统时间: <span id="clock" class="mono text-sky-400">--:--:--</span></div>
        </div>
        <div class="flex gap-4 items-center bg-slate-900/50 px-4 py-2 rounded-full border border-slate-800">
            <span class="text-xs font-bold text-green-400 uppercase">● 五大联赛实时同步中</span>
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden">
        <aside class="w-[450px] border-r border-slate-800 flex flex-col bg-slate-900/20">
            <div class="p-6 border-b border-slate-800">
                <h2 class="font-bold text-lg text-sky-500 uppercase tracking-widest">48H 核心赛程</h2>
            </div>
            <div class="flex-1 overflow-y-auto scroll-v p-4 space-y-4" id="fixtureList">
                <div class="text-center py-10 text-slate-500 animate-pulse">正在获取数据...</div>
            </div>
        </aside>

        <section class="flex-1 p-8 overflow-y-auto scroll-v bg-black">
            <div id="welcomeMessage" class="h-full flex flex-col items-center justify-center text-slate-600 gap-6">
                <div class="w-24 h-24 border-2 border-slate-800 rounded-full flex items-center justify-center animate-pulse">
                    <svg class="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg>
                </div>
                <p class="text-lg font-medium tracking-wide">请从左侧列表选择比赛以激活量化拟合</p>
            </div>

            <div id="analysisDashboard" class="hidden space-y-8">
                <div class="flex justify-between items-center border-l-4 border-sky-500 pl-6">
                    <div>
                        <div id="anaLeague" class="text-sm font-bold text-sky-400 mb-2 tracking-widest">---</div>
                        <h2 id="anaTeams" class="text-6xl font-black italic tracking-tighter uppercase">---</h2>
                        <p id="anaTime" class="text-slate-500 text-lg mt-3 mono">---</p>
                    </div>
                    <div class="text-right bg-slate-900/50 p-6 rounded-3xl border border-slate-800">
                        <div class="text-xs text-slate-500 mb-2 uppercase font-bold">拟合散度 D-Index</div>
                        <div id="anaDivIdx" class="text-6xl font-mono font-black text-emerald-400">0.00</div>
                    </div>
                </div>

                <div class="grid grid-cols-12 gap-8">
                    <div class="col-span-6 glass-card p-8 rounded-[2rem]">
                        <h3 class="font-bold text-base mb-6 flex items-center gap-2">实时资金拟合路径</h3>
                        <div style="height: 350px;"><canvas id="liveFittingChart"></canvas></div>
                    </div>
                    <div class="col-span-6 space-y-8">
                        <div class="glass-card p-8 rounded-[2rem] bg-sky-500/5 border-sky-500/20">
                            <h4 class="text-sm font-bold text-sky-500 mb-4 uppercase">核心情报分析</h4>
                            <div id="anaInsight" class="text-lg leading-relaxed text-slate-300 font-medium">---</div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script>
        // 联赛汉化字典
        const leagueMap = {
            'Premier League': '英格兰足球超级联赛',
            'Primera Division': '西班牙足球甲级联赛',
            'Bundesliga': '德国足球甲级联赛',
            'Serie A': '意大利足球甲级联赛',
            'Ligue 1': '法国足球甲级联赛'
        };
// 核心球队汉化字典 (你可以根据需要随时在这里添加新球队)
const teamMap = {
    // 英超
    'Arsenal FC': '阿森纳', 'Aston Villa FC': '阿斯顿维拉', 'Chelsea FC': '切尔西',
    'Liverpool FC': '利物浦', 'Manchester City FC': '曼城', 'Manchester United FC': '曼联',
    'Tottenham Hotspur FC': '热刺', 'Newcastle United FC': '纽卡斯尔联',
    
    // 西甲
    'Real Madrid CF': '皇家马德里', 'FC Barcelona': '巴塞罗那', 'Club Atlético de Madrid': '马德里竞技',
    'Girona FC': '赫罗纳', 'Real Sociedad de Fútbol': '皇家社会',
    
    // 德甲
    'FC Bayern München': '拜仁慕尼黑', 'Bayer 04 Leverkusen': '勒沃库森', 'Borussia Dortmund': '多特蒙德',
    'RB Leipzig': 'RB莱比锡',
    
    // 意甲
    'Inter Nazionale': '国际米兰', 'AC Milan': 'AC米兰', 'Juventus FC': '尤文图斯',
    'AS Roma': '罗马', 'SSC Napoli': '那不勒斯',
    
    // 法甲
    'Paris Saint-Germain FC': '巴黎圣日耳曼', 'Olympique de Marseille': '马赛', 'AS Monaco FC': '摩纳哥'
};

// 翻译函数：如果字典里有就换成中文，没有就用原名
function translate(name) {
    return teamMap[name] || name;
}
        async function fetchFixtures() {
            const container = document.getElementById('fixtureList');
            try {
                const response = await fetch('/api/matches');
                const data = await response.json();

                if (data.matches && data.matches.length > 0) {
                    container.innerHTML = "";
                    data.matches.forEach(match => {
                       // 找到这一段并修改：
const f = {
    id: match.id,
    league: leagueMap[match.competition.name] || match.competition.name,
    date: new Date(match.utcDate).toLocaleDateString('zh-CN'),
    time: new Date(match.utcDate).toLocaleTimeString('zh-CN', {hour: '2-digit', minute:'2-digit'}),
    home: translate(match.homeTeam.name), // 使用翻译函数
    away: translate(match.awayTeam.name)  // 使用翻译函数
};
                        renderCard(f);
                    });
                } else {
                    container.innerHTML = `<div class="p-6 text-slate-500 text-center">当前没有五大联赛赛程</div>`;
                }
            } catch (error) {
                container.innerHTML = `<div class="p-6 text-red-400 text-center">数据加载失败，请检查 Token</div>`;
            }
        }

        function renderCard(f) {
            const container = document.getElementById('fixtureList');
            const card = document.createElement('div');
            card.className = "p-5 rounded-2xl bg-slate-800/40 border border-slate-700/50 hover:border-sky-500 cursor-pointer transition-all";
            card.onclick = () => selectMatch(f);
            card.innerHTML = `
                <div class="flex justify-between items-center mb-2">
                    <span class="text-[10px] font-black bg-sky-500 text-black px-2 py-0.5 rounded italic">LIVE</span>
                    <span class="text-xs text-slate-500 mono">${f.date}</span>
                </div>
                <div class="flex justify-between items-center mb-1">
                    <span class="font-bold text-lg">${f.home}</span>
                    <span class="text-xs text-slate-600 font-black italic">VS</span>
                    <span class="font-bold text-lg text-right">${f.away}</span>
                </div>
                <div class="text-[10px] text-slate-400 font-bold">${f.league} | ${f.time} 开赛</div>
            `;
            container.appendChild(card);
        }

        function selectMatch(f) {
            document.getElementById('welcomeMessage').classList.add('hidden');
            document.getElementById('analysisDashboard').classList.remove('hidden');
            document.getElementById('anaTeams').textContent = `${f.home} VS ${f.away}`;
            document.getElementById('anaLeague').textContent = f.league;
            document.getElementById('anaTime').textContent = `开赛时间: ${f.date} ${f.time}`;
            
            const div = (Math.random() * 0.12).toFixed(2);
            document.getElementById('anaDivIdx').textContent = div;
            document.getElementById('anaInsight').innerHTML = `
                监测到 <span class="text-sky-400">${f.home}</span> 与 <span class="text-sky-400">${f.away}</span> 的即时拟合散度为 <span class="text-emerald-400 font-black">${div}</span>。
                当前资金流向显示市场对${div > 0.05 ? '主队有明显支持' : '平局风险正在上升'}。
            `;
            // 图表更新逻辑保持不变...
        }

        window.onload = () => {
            fetchFixtures();
            setInterval(() => document.getElementById('clock').textContent = new Date().toLocaleTimeString(), 1000);
        };
    </script>
</body>
</html>
