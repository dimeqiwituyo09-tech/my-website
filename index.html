<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Quantum League V3.1 | 布局锁定终端</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        body { background: #020617; color: #f8fafc; height: 100vh; overflow: hidden; font-family: 'Inter', -apple-system, sans-serif; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        
        /* 侧边栏宽度锁定 */
        aside { width: 380px; min-width: 380px; flex-shrink: 0; }
        
        /* 滚动条锁定 */
        .scroll-v { overflow-y: auto; height: calc(100vh - 56px); }
        .scroll-v::-webkit-scrollbar { width: 4px; }
        .scroll-v::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }

        /* 主界面布局锁定 */
        #dashboard { 
            max-width: 1200px; /* 锁定最大宽度，防止大屏下过度拉伸 */
            margin: 0 auto;
            padding: 40px;
        }

        /* 图表容器硬锁定 */
        .chart-container {
            position: relative;
            height: 400px; /* 硬性固定高度 */
            width: 100%;
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid rgba(30, 41, 59, 0.5);
            border-radius: 24px;
            padding: 24px;
        }

        .match-card { border: 1px solid rgba(56, 189, 248, 0.1); background: rgba(15, 23, 42, 0.5); transition: 0.2s; }
        .match-card:hover { border-color: #38bdf8; background: rgba(56, 189, 248, 0.1); }
        .active-card { border-color: #38bdf8 !important; background: rgba(56, 189, 248, 0.15) !important; }
    </style>
</head>
<body class="flex flex-col">

    <header class="h-14 border-b border-slate-800 flex items-center justify-between px-6 bg-slate-950/90 z-10">
        <div class="flex items-center gap-4">
            <span class="bg-sky-500 text-black text-[10px] font-black px-2 py-0.5 rounded italic">FIXED-LAYOUT V3.1</span>
            <span id="clock" class="text-xs text-slate-500 mono">--:--:--</span>
        </div>
        <div class="text-[10px] text-sky-400 font-bold uppercase tracking-widest">48H 精准量化终端</div>
    </header>

    <main class="flex-1 flex overflow-hidden">
        <aside class="border-r border-slate-800 bg-slate-950/20">
            <div id="fixtureList" class="scroll-v p-4 space-y-3">
                <div class="py-20 text-center text-slate-700 animate-pulse text-[10px] uppercase">同步中...</div>
            </div>
        </aside>

        <section class="flex-1 bg-[#020617] overflow-y-auto">
            <div id="welcome" class="h-full flex flex-col items-center justify-center opacity-10">
                <div class="text-6xl mb-4">🛰️</div>
                <p class="tracking-[0.5em] text-[10px]">Awaiting Sequence Selection</p>
            </div>

            <div id="dashboard" class="hidden">
                <div class="flex justify-between items-end mb-10 pb-8 border-b border-slate-800/50">
                    <div>
                        <div id="mLeague" class="text-sky-500 text-[10px] font-black mb-3 tracking-[0.2em] uppercase">---</div>
                        <h2 id="mTeams" class="text-4xl font-black italic tracking-tighter uppercase text-slate-100">---</h2>
                        <div id="mTime" class="text-xs text-slate-500 mt-4 mono tracking-widest">---</div>
                    </div>
                    <div class="text-right">
                        <div class="text-[9px] text-slate-500 mb-2 font-bold uppercase tracking-widest">偏差指数</div>
                        <div id="mDiff" class="text-6xl font-black text-emerald-400 mono leading-none">0.00</div>
                    </div>
                </div>
                
                <div class="grid grid-cols-1 gap-8">
                    <div class="chart-container">
                        <h3 class="text-[10px] text-slate-500 font-bold mb-6 uppercase tracking-widest">机构价格拟合曲线 (Live Fitting)</h3>
                        <canvas id="chart"></canvas>
                    </div>
                    
                    <div class="grid grid-cols-3 gap-6">
                        <div class="bg-slate-900/40 p-6 rounded-2xl border border-slate-800">
                            <div class="text-[9px] text-slate-500 mb-2 uppercase font-bold">威廉现价</div>
                            <div id="p-wh" class="text-2xl font-black mono text-slate-200">--</div>
                        </div>
                        <div class="bg-slate-900/40 p-6 rounded-2xl border border-slate-800">
                            <div class="text-[9px] text-slate-500 mb-2 uppercase font-bold">平博定价</div>
                            <div id="p-pin" class="text-2xl font-black mono text-emerald-400">--</div>
                        </div>
                        <div class="bg-sky-500/5 p-6 rounded-2xl border border-sky-500/20">
                            <div class="text-[9px] text-sky-500 mb-2 uppercase font-bold">状态</div>
                            <div id="mInsight" class="text-xs text-slate-400 italic font-medium">等待分析...</div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script>
        const teamMap = { /* 同 V3.0 字典... */ };
        const leagueMap = { /* 同 V3.0 字典... */ };

        async function update() {
            const list = document.getElementById('fixtureList');
            try {
                const res = await fetch('/api/data');
                const data = await res.json();
                list.innerHTML = "";
                data.forEach(m => {
                    const date = new Date(m.commence_time);
                    const timeStr = `${date.getMonth()+1}/${date.getDate()} ${date.getHours().toString().padStart(2,'0')}:${date.getMinutes().toString().padStart(2,'0')}`;
                    const h = teamMap[m.home_team] || m.home_team;
                    const a = teamMap[m.away_team] || m.away_team;
                    const l = leagueMap[m.sport_key] || m.sport_title;

                    const card = document.createElement('div');
                    card.className = "match-card p-5 rounded-2xl cursor-pointer";
                    card.onclick = () => {
                        document.querySelectorAll('.match-card').forEach(c => c.classList.remove('active-card'));
                        card.classList.add('active-card');
                        showMatch(m, h, a, l);
                    };
                    card.innerHTML = `
                        <div class="flex justify-between items-center mb-2">
                            <span class="text-[9px] font-black text-sky-500 uppercase">${l}</span>
                            <span class="text-[10px] text-slate-600 mono">${timeStr}</span>
                        </div>
                        <div class="text-sm font-bold text-slate-200">${h} <span class="text-slate-700 mx-1 text-[10px]">VS</span> ${a}</div>
                    `;
                    list.appendChild(card);
                });
            } catch (e) { list.innerHTML = "Sync Error"; }
        }

        let chartObj = null;
        function showMatch(m, h, a, l) {
            document.getElementById('welcome').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            document.getElementById('mTeams').textContent = `${h} VS ${a}`;
            document.getElementById('mLeague').textContent = l;
            document.getElementById('mTime').textContent = `START TIME: ${new Date(m.commence_time).toLocaleString()}`;
            
            const wh = m.bookmakers.find(b => b.key === 'williamhill')?.markets[0].outcomes[0].price || 0;
            const pin = m.bookmakers.find(b => b.key === 'pinnacle')?.markets[0].outcomes[0].price || 0;
            
            document.getElementById('p-wh').textContent = wh;
            document.getElementById('p-pin').textContent = pin;
            const diff = (wh - pin).toFixed(2);
            document.getElementById('mDiff').textContent = diff;
            document.getElementById('mInsight').textContent = Math.abs(diff) > 0.1 ? '检测到非对称定价偏差' : '市场定价相对均衡';
            
            const ctx = document.getElementById('chart').getContext('2d');
            if (chartObj) chartObj.destroy();
            chartObj = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['OPEN', 'MID', 'LIVE'],
                    datasets: [
                        { label: 'Market', data: [wh+0.04, wh+0.02, wh], borderColor: '#1e293b', borderDash: [5,5], tension: 0.4 },
                        { label: 'Quant', data: [pin+0.08, pin+0.03, pin], borderColor: '#10b981', borderWidth: 3, tension: 0.4, fill: true, backgroundColor: 'rgba(16, 185, 129, 0.05)' }
                    ]
                },
                options: { 
                    responsive: true, 
                    maintainAspectRatio: false, // 允许填满固定高度的容器
                    plugins: { legend: { display: false } },
                    scales: { 
                        y: { grid: { color: '#0f172a' }, ticks: { color: '#475569', font: { size: 10 } } },
                        x: { grid: { display: false }, ticks: { color: '#475569', font: { size: 10 } } }
                    }
                }
            });
        }

        window.onload = () => {
            update();
            setInterval(() => document.getElementById('clock').textContent = new Date().toLocaleTimeString(), 1000);
        };
    </script>
</body>
</html>
